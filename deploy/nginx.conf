# nginx設定例 - Bookshelf4MD
#
# 使用方法:
# 1. このファイルを /etc/nginx/sites-available/bookshelf4md にコピー
# 2. シンボリックリンクを作成: sudo ln -s /etc/nginx/sites-available/bookshelf4md /etc/nginx/sites-enabled/
# 3. 設定をテスト: sudo nginx -t
# 4. nginxを再起動: sudo systemctl restart nginx
#
# Gunicornと一緒に使用することを推奨します:
# gunicorn -w 4 -b 127.0.0.1:5000 app:app

server {
    listen 80;
    server_name your-domain.com;  # ドメイン名に変更してください

    # ログ
    access_log /var/log/nginx/bookshelf4md_access.log;
    error_log /var/log/nginx/bookshelf4md_error.log;

    # 最大アップロードサイズ
    client_max_body_size 16M;

    # 静的ファイル（Flaskを経由せず直接配信）
    location /static/ {
        alias /path/to/bookshelf4md/static/;  # パスを変更してください
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # メディアファイル
    location /media/ {
        alias /path/to/bookshelf4md/static/media/;  # パスを変更してください
        expires 7d;
        add_header Cache-Control "public";
    }

    # ファビコン等
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Flaskアプリへのプロキシ
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # セキュリティヘッダー（本番環境推奨）
    # add_header X-Frame-Options "SAMEORIGIN" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header X-XSS-Protection "1; mode=block" always;

    # HTTPSへのリダイレクト（HTTPS証明書がある場合）
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }
}

